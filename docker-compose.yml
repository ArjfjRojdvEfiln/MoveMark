version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: movemark-mysql
    environment:
      MYSQL_ROOT_PASSWORD: movemark123
      MYSQL_DATABASE: movemark
      MYSQL_USER: movemark
      MYSQL_PASSWORD: movemark123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2
    container_name: movemark-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: movemark-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: movemark-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: movemark
      RABBITMQ_DEFAULT_PASS: movemark123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mysql_data:
  redis_data:
  es_data:
  rabbitmq_data: